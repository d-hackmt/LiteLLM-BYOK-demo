<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 280">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
  </defs>
  <rect width="940" height="280" fill="#0f1117"/>
  <text x="470" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">LANGCHAIN INTEGRATION — DROP-IN LLM BACKEND</text>

  <!-- Your App -->
  <rect x="20" y="105" width="120" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="80" y="136" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- ChatPromptTemplate -->
  <rect x="195" y="98" width="150" height="64" rx="8" fill="#111827" stroke="#4b5563" stroke-width="1.5"/>
  <text x="270" y="122" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Prompt</text>
  <text x="270" y="139" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">ChatPromptTemplate</text>
  <text x="270" y="153" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">system + user vars</text>

  <!-- ChatLiteLLM -->
  <rect x="400" y="98" width="170" height="64" rx="8" fill="#1c1800" stroke="#eab308" stroke-width="2"/>
  <text x="485" y="122" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" font-family="system-ui,sans-serif">ChatLiteLLM</text>
  <text x="485" y="139" text-anchor="middle" fill="#d97706" font-size="10" font-family="system-ui,sans-serif">model="gemini/..."</text>
  <text x="485" y="153" text-anchor="middle" fill="#78350f" font-size="10" font-family="system-ui,sans-serif">LangChain LLM wrapper</text>

  <!-- Provider -->
  <rect x="630" y="105" width="155" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="707" y="136" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">LLM Provider</text>

  <!-- StrOutputParser -->
  <rect x="810" y="105" width="110" height="50" rx="8" fill="#111827" stroke="#4b5563" stroke-width="1.5"/>
  <text x="865" y="123" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" font-family="system-ui,sans-serif">Output</text>
  <text x="865" y="140" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">Parser</text>

  <!-- Arrows -->
  <line x1="142" y1="130" x2="193" y2="130" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="347" y1="130" x2="398" y2="130" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="572" y1="130" x2="628" y2="130" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="787" y1="130" x2="808" y2="130" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Pipe notation -->
  <text x="272" y="188" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">chain = prompt</text>
  <text x="430" y="188" text-anchor="middle" fill="#eab308" font-size="14" font-weight="700" font-family="monospace">|</text>
  <text x="485" y="188" text-anchor="middle" fill="#d97706" font-size="12" font-family="monospace">llm</text>
  <text x="570" y="188" text-anchor="middle" fill="#eab308" font-size="14" font-weight="700" font-family="monospace">|</text>
  <text x="650" y="188" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">StrOutputParser()</text>

  <!-- LCEL label -->
  <text x="470" y="215" text-anchor="middle" fill="#475569" font-size="10" font-family="system-ui,sans-serif">LCEL — LangChain Expression Language</text>

  <!-- Caption -->
  <text x="470" y="248" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">swap model="gemini/..." → "groq/..." → "claude-..." and the entire chain switches providers</text>
  <text x="470" y="264" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">All LangChain features (memory, tools, agents, RAG) work as normal — LiteLLM is just the LLM backend</text>
</svg>
