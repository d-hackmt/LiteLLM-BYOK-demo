<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#818cf8"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
  </defs>
  <rect width="860" height="340" fill="#0f1117"/>
  <text x="430" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">OBSERVABILITY — LOG EVERY CALL WITH CALLBACKS</text>

  <!-- Your App -->
  <rect x="25" y="120" width="120" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="85" y="151" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- LiteLLM completion() -->
  <rect x="208" y="112" width="165" height="66" rx="8" fill="#1c1800" stroke="#eab308" stroke-width="2"/>
  <text x="290" y="136" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700" font-family="system-ui,sans-serif">LiteLLM</text>
  <text x="290" y="153" text-anchor="middle" fill="#d97706" font-size="11" font-family="system-ui,sans-serif">completion()</text>
  <text x="290" y="168" text-anchor="middle" fill="#78350f" font-size="10" font-family="system-ui,sans-serif">+ callbacks wired</text>

  <!-- Provider -->
  <rect x="440" y="120" width="145" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="512" y="151" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">LLM Provider</text>

  <!-- success_callback box -->
  <rect x="440" y="205" width="200" height="68" rx="8" fill="#1a1040" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="540" y="226" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600" font-family="system-ui,sans-serif">success_callback</text>
  <text x="540" y="244" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="system-ui,sans-serif">model, prompt, tokens</text>
  <text x="540" y="259" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="system-ui,sans-serif">latency, cost, user</text>

  <!-- failure_callback box -->
  <rect x="660" y="120" width="170" height="50" rx="8" fill="#2d0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="745" y="141" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600" font-family="system-ui,sans-serif">failure_callback</text>
  <text x="745" y="158" text-anchor="middle" fill="#ef4444" font-size="10" font-family="system-ui,sans-serif">exception, kwargs</text>

  <!-- call_logs store -->
  <rect x="660" y="215" width="170" height="58" rx="8" fill="#0a2518" stroke="#22c55e" stroke-width="1.5"/>
  <text x="745" y="237" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600" font-family="system-ui,sans-serif">call_logs[ ]</text>
  <text x="745" y="254" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif">per-user audit trail</text>
  <text x="745" y="269" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif">cost · latency · tokens</text>

  <!-- App → LiteLLM -->
  <line x1="147" y1="145" x2="206" y2="145" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <!-- LiteLLM → Provider -->
  <line x1="375" y1="145" x2="438" y2="145" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <!-- Provider → LiteLLM return -->
  <line x1="438" y1="162" x2="375" y2="162" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <!-- LiteLLM → App return -->
  <line x1="206" y1="162" x2="147" y2="162" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- success_callback fires (vertical dashed from LiteLLM) -->
  <line x1="400" y1="180" x2="480" y2="203" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <text x="420" y="197" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">fires after</text>
  <text x="420" y="209" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">every call</text>

  <!-- failure_callback fires -->
  <line x1="587" y1="145" x2="658" y2="145" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="622" y="138" text-anchor="middle" fill="#ef4444" font-size="10" font-family="system-ui,sans-serif">on error</text>

  <!-- success_callback → call_logs -->
  <line x1="640" y1="235" x2="658" y2="235" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="650" y="228" text-anchor="middle" fill="#22c55e" font-size="9" font-family="system-ui,sans-serif">appends</text>

  <!-- Caption -->
  <text x="430" y="308" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">litellm.success_callback = [your_fn] · litellm.failure_callback = [your_fn]</text>
  <text x="430" y="324" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Every call triggers your function — full audit trail, chargeback, debugging, alerting</text>
</svg>
