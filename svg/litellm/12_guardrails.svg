<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
  </defs>
  <rect width="940" height="460" fill="#0f1117"/>
  <text x="470" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">GUARDRAILS — THREE LAYERS OF PRE-CALL PROTECTION</text>

  <!-- User prompt input -->
  <rect x="25" y="195" width="110" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="80" y="216" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="500" font-family="system-ui,sans-serif">User</text>
  <text x="80" y="231" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="500" font-family="system-ui,sans-serif">Prompt</text>

  <!-- input_callback pipeline (vertical stack) -->

  <!-- Guardrail 1: PII Redaction -->
  <rect x="198" y="88" width="220" height="78" rx="8" fill="#1a0e38" stroke="#8b5cf6" stroke-width="2"/>
  <text x="308" y="110" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700" font-family="system-ui,sans-serif">1. PII Redaction</text>
  <text x="308" y="128" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="system-ui,sans-serif">email → &lt;EMAIL_REDACTED&gt;</text>
  <text x="308" y="143" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="system-ui,sans-serif">phone → &lt;PHONE_REDACTED&gt;</text>
  <text x="308" y="158" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="system-ui,sans-serif">PAN / Aadhaar / SSN / CC</text>

  <!-- Guardrail 2: Prompt Injection -->
  <rect x="198" y="188" width="220" height="78" rx="8" fill="#2d0f0f" stroke="#ef4444" stroke-width="2"/>
  <text x="308" y="210" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700" font-family="system-ui,sans-serif">2. Prompt Injection</text>
  <text x="308" y="228" text-anchor="middle" fill="#f87171" font-size="10" font-family="system-ui,sans-serif">"ignore previous instructions"</text>
  <text x="308" y="243" text-anchor="middle" fill="#f87171" font-size="10" font-family="system-ui,sans-serif">"You are now DAN..."</text>
  <text x="308" y="258" text-anchor="middle" fill="#f87171" font-size="10" font-family="system-ui,sans-serif">→ GuardrailViolation raised</text>

  <!-- Guardrail 3: Forbidden Topics -->
  <rect x="198" y="288" width="220" height="78" rx="8" fill="#1c1200" stroke="#f59e0b" stroke-width="2"/>
  <text x="308" y="310" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700" font-family="system-ui,sans-serif">3. Forbidden Topics</text>
  <text x="308" y="328" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">"weapon", "hack", "malware"</text>
  <text x="308" y="343" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">"drugs", "self-harm"</text>
  <text x="308" y="358" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">→ GuardrailViolation raised</text>

  <!-- input_callback label: horizontal text above all three guardrail boxes -->
  <text x="308" y="57" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" font-family="system-ui,sans-serif">litellm.input_callback = [pii_fn, injection_fn, topic_fn]</text>
  <line x1="200" y1="65" x2="416" y2="65" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ALLOWED path: all guardrails pass → LLM -->
  <rect x="510" y="188" width="155" height="78" rx="8" fill="#1c1800" stroke="#eab308" stroke-width="2"/>
  <text x="587" y="212" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" font-family="system-ui,sans-serif">LiteLLM</text>
  <text x="587" y="229" text-anchor="middle" fill="#d97706" font-size="11" font-family="system-ui,sans-serif">completion()</text>
  <text x="587" y="246" text-anchor="middle" fill="#78350f" font-size="10" font-family="system-ui,sans-serif">prompt is now clean</text>

  <!-- LLM Provider -->
  <rect x="720" y="195" width="185" height="64" rx="8" fill="#0a2518" stroke="#22c55e" stroke-width="1.5"/>
  <text x="812" y="218" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600" font-family="system-ui,sans-serif">LLM Provider</text>
  <text x="812" y="236" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif">never saw raw PII</text>
  <text x="812" y="251" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif">injection blocked upstream</text>

  <!-- BLOCKED path arrows -->
  <!-- PII: allowed (redacted) → LiteLLM -->
  <line x1="420" y1="127" x2="508" y2="220" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="476" y="165" fill="#a78bfa" font-size="10" font-family="system-ui,sans-serif">✓ redacted</text>

  <!-- Injection: blocked -->
  <line x1="420" y1="227" x2="505" y2="247" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ar)"/>
  <text x="465" y="235" fill="#ef4444" font-size="10" font-family="system-ui,sans-serif">✓ passes</text>
  <rect x="475" y="95" width="130" height="28" rx="4" fill="#2d0f0f" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="114" text-anchor="middle" fill="#ef4444" font-size="10" font-family="system-ui,sans-serif">❌ BLOCKED — exception</text>
  <line x1="418" y1="210" x2="473" y2="108" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Topic: blocked -->
  <rect x="475" y="320" width="130" height="28" rx="4" fill="#1c1200" stroke="#f59e0b" stroke-width="1"/>
  <text x="540" y="339" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="system-ui,sans-serif">❌ BLOCKED — exception</text>
  <line x1="418" y1="328" x2="473" y2="334" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- User → Guardrails -->
  <line x1="137" y1="220" x2="196" y2="220" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- LiteLLM → Provider -->
  <line x1="667" y1="228" x2="718" y2="228" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Caption -->
  <text x="470" y="405" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">All three run inside litellm.input_callback — fires before every API call, on every model</text>
  <text x="470" y="421" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">PII never leaves your machine · Injections blocked at source · Topics enforced company-wide</text>
  <text x="470" y="437" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">No external dependencies — pure Python regex and keyword matching</text>
</svg>
