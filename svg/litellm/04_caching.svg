<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a78bfa"/></marker>
  </defs>
  <rect width="900" height="450" fill="#0f1117"/>
  <text x="450" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">CACHING — DON'T PAY TWICE FOR THE SAME QUESTION</text>

  <!-- Your App (center x=85) -->
  <rect x="20" y="190" width="130" height="52" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="85" y="222" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- LiteLLM (center x=280) -->
  <rect x="200" y="183" width="160" height="66" rx="8" fill="#1c1800" stroke="#eab308" stroke-width="2"/>
  <text x="280" y="207" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700" font-family="system-ui,sans-serif">LiteLLM</text>
  <text x="280" y="224" text-anchor="middle" fill="#d97706" font-size="11" font-family="system-ui,sans-serif">completion(</text>
  <text x="280" y="238" text-anchor="middle" fill="#d97706" font-size="11" font-family="system-ui,sans-serif">  caching=True)</text>

  <!-- Cache diamond (center x=490, y=216) -->
  <polygon points="490,174 572,216 490,258 408,216" fill="#1a0e38" stroke="#8b5cf6" stroke-width="2"/>
  <text x="490" y="212" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Cache</text>
  <text x="490" y="228" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui,sans-serif">Hit?</text>

  <!-- YES → Cached Response (upper right) -->
  <rect x="655" y="100" width="215" height="52" rx="8" fill="#1a0e38" stroke="#8b5cf6" stroke-width="2"/>
  <text x="762" y="121" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Cache Store</text>
  <text x="762" y="139" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui,sans-serif">⚡ &lt; 1ms · Zero LLM cost</text>

  <!-- NO → LLM Provider (lower right) -->
  <rect x="655" y="296" width="215" height="52" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="762" y="317" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="500" font-family="system-ui,sans-serif">LLM Provider</text>
  <text x="762" y="335" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Real API call · costs tokens</text>

  <!-- App → LiteLLM -->
  <line x1="152" y1="212" x2="198" y2="212" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <!-- LiteLLM → Cache -->
  <line x1="362" y1="216" x2="406" y2="216" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="384" y="208" text-anchor="middle" fill="#7b9fd4" font-size="10" font-family="system-ui,sans-serif">lookup</text>

  <!-- Cache YES → store (upper right) -->
  <line x1="563" y1="196" x2="653" y2="152" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#av)"/>
  <text x="616" y="164" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="system-ui,sans-serif">YES ⚡ HIT</text>

  <!-- Cache NO → LLM (lower right) -->
  <line x1="563" y1="238" x2="653" y2="308" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="614" y="292" text-anchor="middle" fill="#7b9fd4" font-size="11" font-weight="600" font-family="system-ui,sans-serif">NO — MISS</text>

  <!-- Cache HIT → App: routed along TOP edge to avoid crossing -->
  <path d="M 653,126 L 653,55 L 85,55 L 85,188" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,2" fill="none" marker-end="url(#ag)"/>
  <text x="370" y="47" text-anchor="middle" fill="#22c55e" font-size="10" font-family="system-ui,sans-serif">⚡ Instant response (no LLM call)</text>

  <!-- LLM → LiteLLM: routed along BOTTOM edge to avoid crossing -->
  <path d="M 762,350 L 762,392 L 280,392 L 280,251" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <text x="520" y="386" text-anchor="middle" fill="#22c55e" font-size="10" font-family="system-ui,sans-serif">Store in cache + return</text>

  <!-- LiteLLM → App return -->
  <line x1="198" y1="232" x2="152" y2="232" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- litellm.cache = Cache(type="local") label -->
  <rect x="195" y="272" width="165" height="28" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="277" y="291" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">litellm.cache = Cache(type="local")</text>

  <!-- Caption -->
  <text x="450" y="418" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">First call → hits LLM · Second identical call → returns from cache instantly at zero cost</text>
  <text x="450" y="434" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Use type="redis" in production for shared cache across replicas</text>
</svg>
