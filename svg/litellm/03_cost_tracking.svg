<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 268">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="ay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#eab308"/></marker>
  </defs>
  <rect width="860" height="268" fill="#0f1117"/>
  <text x="430" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">COST TRACKING — KNOW EXACTLY WHAT EVERY CALL COSTS</text>

  <!-- Your App -->
  <rect x="30" y="95" width="130" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="95" y="126" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- LiteLLM -->
  <rect x="220" y="88" width="165" height="64" rx="8" fill="#1c1800" stroke="#eab308" stroke-width="2"/>
  <text x="302" y="112" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700" font-family="system-ui,sans-serif">LiteLLM</text>
  <text x="302" y="128" text-anchor="middle" fill="#d97706" font-size="11" font-family="system-ui,sans-serif">completion()</text>
  <text x="302" y="143" text-anchor="middle" fill="#d97706" font-size="11" font-family="system-ui,sans-serif">completion_cost()</text>

  <!-- Provider -->
  <rect x="455" y="95" width="175" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="542" y="126" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">LLM Provider</text>

  <!-- Cost output box -->
  <rect x="680" y="75" width="155" height="90" rx="8" fill="#0a2518" stroke="#22c55e" stroke-width="1.5"/>
  <text x="757" y="98" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Usage Report</text>
  <text x="757" y="116" text-anchor="middle" fill="#4ade80" font-size="11" font-family="system-ui,sans-serif">Input: 14 tokens</text>
  <text x="757" y="131" text-anchor="middle" fill="#4ade80" font-size="11" font-family="system-ui,sans-serif">Output: 19 tokens</text>
  <text x="757" y="148" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" font-family="system-ui,sans-serif">Cost: $0.00001350</text>

  <!-- App → LiteLLM -->
  <line x1="162" y1="116" x2="218" y2="116" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <!-- LiteLLM → Provider -->
  <line x1="387" y1="116" x2="453" y2="116" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <!-- Provider → LiteLLM return -->
  <line x1="453" y1="134" x2="387" y2="134" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <!-- LiteLLM → App return -->
  <line x1="218" y1="134" x2="162" y2="134" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- LiteLLM → Cost box: routed BELOW the LLM Provider box so it doesn't overlap -->
  <path d="M 302,152 L 302,178 L 757,178 L 757,167" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#ay)"/>
  <text x="530" y="192" text-anchor="middle" fill="#eab308" font-size="10" font-family="system-ui,sans-serif">auto-calculates cost from response</text>

  <!-- Caption -->
  <text x="430" y="224" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Built-in pricing database for 100+ models · No separate billing API · Per-call cost in USD</text>
  <text x="430" y="240" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Tag calls by user or team → aggregate costs per department, per day, per project</text>
</svg>
