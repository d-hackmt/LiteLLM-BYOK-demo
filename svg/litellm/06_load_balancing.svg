<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="ay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#eab308"/></marker>
  </defs>
  <rect width="900" height="340" fill="#0f1117"/>
  <text x="450" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">LOAD BALANCING — MULTIPLE DEPLOYMENTS UNDER ONE ALIAS</text>

  <!-- Your App -->
  <rect x="25" y="148" width="130" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="90" y="179" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- Router ("gpt-pool") -->
  <rect x="225" y="138" width="175" height="70" rx="8" fill="#1c1800" stroke="#eab308" stroke-width="2"/>
  <text x="312" y="163" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700" font-family="system-ui,sans-serif">Router</text>
  <text x="312" y="180" text-anchor="middle" fill="#d97706" font-size="11" font-family="system-ui,sans-serif">model="gpt-pool"</text>
  <text x="312" y="196" text-anchor="middle" fill="#78350f" font-size="10" font-family="system-ui,sans-serif">simple-shuffle strategy</text>

  <!-- Deployment 1: GPT-OSS -->
  <rect x="490" y="58" width="220" height="46" rx="7" fill="#1c1800" stroke="#eab308" stroke-width="1.5"/>
  <text x="600" y="77" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600" font-family="system-ui,sans-serif">openai-oss-120b</text>
  <text x="600" y="93" text-anchor="middle" fill="#d97706" font-size="10" font-family="system-ui,sans-serif">groq/openai/gpt-oss-120b · key A</text>

  <!-- Deployment 2: Groq Llama -->
  <rect x="490" y="163" width="220" height="46" rx="7" fill="#0a2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="182" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600" font-family="system-ui,sans-serif">groq-llama-70b</text>
  <text x="600" y="198" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif">groq/llama-3.3-70b-versatile · key B</text>

  <!-- Deployment 3: Gemini -->
  <rect x="490" y="268" width="220" height="46" rx="7" fill="#0d1f3c" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="287" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600" font-family="system-ui,sans-serif">gemini-flash</text>
  <text x="600" y="303" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">gemini/gemini-2.5-flash-lite · key C</text>

  <!-- App → Router -->
  <line x1="157" y1="173" x2="223" y2="173" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="190" y="165" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Requests</text>

  <!-- Router → Deployments (fan out) -->
  <line x1="402" y1="165" x2="488" y2="81" stroke="#eab308" stroke-width="1.5" marker-end="url(#ay)"/>
  <line x1="402" y1="173" x2="488" y2="186" stroke="#eab308" stroke-width="1.5" marker-end="url(#ay)"/>
  <line x1="402" y1="181" x2="488" y2="291" stroke="#eab308" stroke-width="1.5" marker-end="url(#ay)"/>

  <!-- Responses back to Router (dashed) -->
  <line x1="488" y1="95" x2="404" y2="168" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ag)"/>
  <line x1="488" y1="196" x2="404" y2="183" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ag)"/>
  <line x1="488" y1="285" x2="404" y2="196" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ag)"/>

  <!-- Router → App return -->
  <line x1="223" y1="193" x2="157" y2="193" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="190" y="212" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Responses</text>

  <!-- Request labels on fan arrows -->
  <text x="447" y="101" fill="#eab308" font-size="9" font-family="system-ui,sans-serif">req #1,#2</text>
  <text x="447" y="176" fill="#eab308" font-size="9" font-family="system-ui,sans-serif">req #3,#4</text>
  <text x="447" y="258" fill="#eab308" font-size="9" font-family="system-ui,sans-serif">req #5,#6</text>

  <!-- Caption -->
  <text x="450" y="318" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">All deployments share one alias "gpt-pool" · Router picks which one to use per request</text>
</svg>
