<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="ay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#eab308"/></marker>
  </defs>
  <rect width="900" height="310" fill="#0f1117"/>
  <text x="450" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">UNIFIED API — ONE FUNCTION FOR ALL PROVIDERS</text>

  <!-- Your App -->
  <rect x="30" y="128" width="140" height="50" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="100" y="159" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- LiteLLM completion() -->
  <rect x="255" y="118" width="195" height="70" rx="8" fill="#1c1800" stroke="#eab308" stroke-width="2"/>
  <text x="352" y="143" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700" font-family="system-ui,sans-serif">LiteLLM</text>
  <text x="352" y="161" text-anchor="middle" fill="#d97706" font-size="12" font-family="system-ui,sans-serif">completion(model=...)</text>
  <text x="352" y="176" text-anchor="middle" fill="#78350f" font-size="10" font-family="system-ui,sans-serif">100+ providers, one syntax</text>

  <!-- Groq Llama -->
  <rect x="600" y="48" width="265" height="40" rx="6" fill="#0a2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="732" y="63" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600" font-family="system-ui,sans-serif">Groq</text>
  <text x="732" y="78" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif">groq/llama-3.3-70b-versatile</text>

  <!-- Groq GPT-OSS -->
  <rect x="600" y="103" width="265" height="40" rx="6" fill="#0a2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="732" y="118" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600" font-family="system-ui,sans-serif">Groq</text>
  <text x="732" y="133" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif">groq/openai/gpt-oss-120b</text>

  <!-- Gemini -->
  <rect x="600" y="158" width="265" height="40" rx="6" fill="#0d1f3c" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="732" y="173" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600" font-family="system-ui,sans-serif">Google</text>
  <text x="732" y="188" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">gemini/gemini-2.5-flash-lite</text>

  <!-- Anthropic -->
  <rect x="600" y="213" width="265" height="40" rx="6" fill="#1c1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="732" y="228" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600" font-family="system-ui,sans-serif">Anthropic</text>
  <text x="732" y="243" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">claude-3-5-haiku-20241022</text>

  <!-- App → LiteLLM -->
  <line x1="172" y1="150" x2="253" y2="150" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="212" y="143" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">one call</text>

  <!-- LiteLLM → Providers fan-out -->
  <line x1="452" y1="138" x2="598" y2="68" stroke="#eab308" stroke-width="1.5" marker-end="url(#ay)"/>
  <line x1="452" y1="147" x2="598" y2="123" stroke="#eab308" stroke-width="1.5" marker-end="url(#ay)"/>
  <line x1="452" y1="157" x2="598" y2="178" stroke="#eab308" stroke-width="1.5" marker-end="url(#ay)"/>
  <line x1="452" y1="166" x2="598" y2="233" stroke="#eab308" stroke-width="1.5" marker-end="url(#ay)"/>

  <!-- Response back -->
  <line x1="253" y1="168" x2="172" y2="168" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="212" y="187" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Response</text>

  <!-- Caption -->
  <text x="450" y="286" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Switch providers by changing one string · Zero SDK rewrites · Same response format for all</text>
</svg>
