<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22c55e"/>
    </marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#818cf8"/>
    </marker>
  </defs>

  <rect width="900" height="300" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">ROUTING — VIA PORTKEY GATEWAY</text>

  <!-- Your App (center x=110) -->
  <rect x="35" y="72" width="150" height="52" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="110" y="104" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- Portkey Gateway (center x=450) -->
  <rect x="375" y="72" width="150" height="52" rx="8" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="94" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="450" y="112" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="system-ui,sans-serif">Gateway</text>

  <!-- Groq LLM (center x=790) -->
  <rect x="715" y="72" width="150" height="52" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="790" y="104" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Groq LLM</text>

  <!-- Portkey Dashboard (center x=450, y=200) -->
  <rect x="368" y="200" width="164" height="54" rx="8" fill="#1a1040" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="222" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="450" y="240" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui,sans-serif">Dashboard</text>

  <!-- App → Portkey -->
  <line x1="187" y1="87" x2="373" y2="87" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="280" y="79" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Request</text>

  <!-- Portkey → Groq -->
  <line x1="527" y1="87" x2="713" y2="87" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="620" y="79" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Forward</text>

  <!-- Groq → Portkey (return) -->
  <line x1="713" y1="109" x2="527" y2="109" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="620" y="132" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Response</text>

  <!-- Portkey → App (return) -->
  <line x1="373" y1="109" x2="187" y2="109" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Portkey → Dashboard (dashed) -->
  <line x1="450" y1="126" x2="450" y2="198" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <text x="500" y="158" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">Auto-logs:</text>
  <text x="500" y="171" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">tokens · cost · latency</text>

  <!-- Caption -->
  <text x="450" y="284" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">All requests logged automatically · Full observability with zero code changes</text>
</svg>
