<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22c55e"/>
    </marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">CACHING — INSTANT RESPONSES FOR REPEAT QUERIES</text>

  <!-- Your App (center x=85) -->
  <rect x="20" y="188" width="130" height="54" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="85" y="221" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- Portkey (center x=270) -->
  <rect x="195" y="188" width="150" height="54" rx="8" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
  <text x="270" y="210" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="270" y="228" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="system-ui,sans-serif">Gateway</text>

  <!-- Cache decision diamond (center x=490, y=215) -->
  <polygon points="490,172 570,215 490,258 410,215" fill="#1a0e38" stroke="#8b5cf6" stroke-width="2"/>
  <text x="490" y="211" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Cache</text>
  <text x="490" y="227" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui,sans-serif">Hit?</text>

  <!-- YES → Cached Response (upper right) -->
  <rect x="660" y="95" width="200" height="54" rx="8" fill="#1a0e38" stroke="#8b5cf6" stroke-width="2"/>
  <text x="760" y="117" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Cached Response</text>
  <text x="760" y="135" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui,sans-serif">⚡ &lt; 50ms · Zero LLM cost</text>

  <!-- NO → Groq LLM (lower right) -->
  <rect x="660" y="290" width="200" height="54" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="760" y="312" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Groq LLM</text>
  <text x="760" y="330" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Normal API call</text>

  <!-- App → Portkey -->
  <line x1="152" y1="210" x2="193" y2="210" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="172" y="202" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Request</text>

  <!-- Portkey → Cache diamond -->
  <line x1="347" y1="215" x2="408" y2="215" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="378" y="207" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Check</text>

  <!-- Cache → YES path (upper right diagonal) -->
  <line x1="561" y1="193" x2="658" y2="145" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ap)"/>
  <text x="618" y="160" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="system-ui,sans-serif">YES ⚡ HIT</text>

  <!-- Cache → NO path (lower right diagonal) -->
  <line x1="561" y1="237" x2="658" y2="300" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="616" y="285" text-anchor="middle" fill="#7b9fd4" font-size="11" font-weight="600" font-family="system-ui,sans-serif">NO — MISS</text>

  <!-- Cached Response → App (return, green) -->
  <line x1="658" y1="125" x2="85" y2="192" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#ag)"/>
  <text x="300" y="142" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Instant response</text>

  <!-- Groq → Portkey (store + return) -->
  <line x1="658" y1="310" x2="347" y2="228" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="500" y="296" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Store in cache + return</text>

  <!-- Portkey → App (return) -->
  <line x1="193" y1="230" x2="152" y2="230" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Cache store indicator on Groq path -->
  <rect x="740" y="218" width="120" height="28" rx="6" fill="#1a0e38" stroke="#6d28d9" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="800" y="237" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="system-ui,sans-serif">Saved to cache store</text>

  <!-- Caption -->
  <text x="450" y="394" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">First request → calls LLM · Second identical request → returns instantly from cache</text>
  <text x="450" y="410" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Same model + same messages = cache hit · One character change = cache miss</text>
</svg>
