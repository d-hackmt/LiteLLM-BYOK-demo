<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22c55e"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="800" height="560" fill="#0f1117"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">RETRIES — AUTOMATIC BACKOFF &amp; RETRY</text>

  <!-- Participant boxes: App=140, Portkey=400, LLM=660 -->
  <rect x="75" y="48" width="130" height="40" rx="6" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="140" y="73" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">App</text>

  <rect x="335" y="48" width="130" height="40" rx="6" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="67" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="400" y="81" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">Gateway</text>

  <rect x="595" y="48" width="130" height="40" rx="6" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="660" y="73" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">LLM</text>

  <!-- Lifelines -->
  <line x1="140" y1="90" x2="140" y2="530" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="90" x2="400" y2="530" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="660" y1="90" x2="660" y2="530" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- MSG 1: App → Portkey: Send Request (y=120) -->
  <line x1="142" y1="120" x2="398" y2="120" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="270" y="113" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Send Request</text>

  <!-- MSG 2: Portkey → LLM: Attempt 1 (y=168) -->
  <line x1="402" y1="168" x2="658" y2="168" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="530" y="160" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Attempt 1</text>

  <!-- MSG 3: LLM → Portkey: 429 (y=210) -->
  <line x1="658" y1="210" x2="402" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="530" y="203" text-anchor="middle" fill="#ef4444" font-size="11" font-family="system-ui,sans-serif">429 Rate Limited</text>

  <!-- Note: Wait 1s backoff (y=225 to 253) -->
  <rect x="335" y="225" width="130" height="28" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="244" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="system-ui,sans-serif">⏳ Wait 1s backoff</text>

  <!-- MSG 4: Portkey → LLM: Attempt 2 (y=295) -->
  <line x1="402" y1="295" x2="658" y2="295" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="530" y="287" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Attempt 2</text>

  <!-- MSG 5: LLM → Portkey: 500 (y=337) -->
  <line x1="658" y1="337" x2="402" y2="337" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="530" y="330" text-anchor="middle" fill="#ef4444" font-size="11" font-family="system-ui,sans-serif">500 Server Error</text>

  <!-- Note: Wait 2s backoff (y=352 to 380) -->
  <rect x="335" y="352" width="130" height="28" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="371" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="system-ui,sans-serif">⏳ Wait 2s backoff</text>

  <!-- MSG 6: Portkey → LLM: Attempt 3 (y=425) -->
  <line x1="402" y1="425" x2="658" y2="425" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="530" y="417" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Attempt 3</text>

  <!-- MSG 7: LLM → Portkey: 200 OK (y=467) -->
  <line x1="658" y1="467" x2="402" y2="467" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="530" y="460" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">200 OK ✓</text>

  <!-- MSG 8: Portkey → App: Response delivered (y=509) -->
  <line x1="398" y1="509" x2="142" y2="509" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="270" y="502" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Response delivered</text>

  <!-- Caption -->
  <text x="400" y="548" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">App sees a single clean response · All retries happen inside Portkey transparently</text>
</svg>
