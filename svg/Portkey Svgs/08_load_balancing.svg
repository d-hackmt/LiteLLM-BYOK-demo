<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22c55e"/>
    </marker>
    <marker id="ay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="920" height="360" fill="#0f1117"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">LOAD BALANCING — DISTRIBUTE TRAFFIC BY WEIGHT</text>

  <!-- Your App (center x=110) -->
  <rect x="35" y="158" width="150" height="54" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="110" y="191" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- Portkey Gateway (center x=400) -->
  <rect x="325" y="158" width="150" height="54" rx="8" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="180" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="400" y="198" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="system-ui,sans-serif">Load Balancer</text>

  <!-- 70B Model (upper right) -->
  <rect x="680" y="78" width="200" height="54" rx="8" fill="#1e2235" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="780" y="100" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Primary Model</text>
  <text x="780" y="118" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="system-ui,sans-serif">70B · High quality</text>

  <!-- 8B Model (lower right) -->
  <rect x="680" y="238" width="200" height="54" rx="8" fill="#1e2235" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="780" y="260" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Fallback Model</text>
  <text x="780" y="278" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">8B · Fast &amp; cheap</text>

  <!-- App → Portkey: 10 requests -->
  <line x1="187" y1="180" x2="323" y2="180" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="255" y="172" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Requests</text>

  <!-- Portkey → 70B: 70% traffic (upper diagonal) -->
  <line x1="475" y1="172" x2="678" y2="118" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="575" y="131" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="system-ui,sans-serif">70% traffic</text>

  <!-- Portkey → 8B: 30% traffic (lower diagonal) -->
  <line x1="475" y1="200" x2="678" y2="255" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="575" y="248" text-anchor="middle" fill="#7b9fd4" font-size="12" font-weight="600" font-family="system-ui,sans-serif">30% traffic</text>

  <!-- 70B → Portkey (response, dashed) -->
  <line x1="678" y1="138" x2="477" y2="185" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ag)"/>

  <!-- 8B → Portkey (response, dashed) -->
  <line x1="678" y1="270" x2="477" y2="205" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ag)"/>

  <!-- Portkey → App: combined responses -->
  <line x1="323" y1="200" x2="187" y2="200" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="255" y="222" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Responses</text>

  <!-- Weight badges -->
  <rect x="595" y="88" width="70" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="630" y="105" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700" font-family="system-ui,sans-serif">weight: 0.7</text>

  <rect x="595" y="258" width="70" height="24" rx="12" fill="#1e2a3a" stroke="#4a6fa5" stroke-width="1"/>
  <text x="630" y="275" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700" font-family="system-ui,sans-serif">weight: 0.3</text>

  <!-- Caption -->
  <text x="460" y="332" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">A/B test models · Manage quota · Gradual migration · Blend cost vs quality</text>
  <text x="460" y="348" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Change weights in config — no code changes in your app</text>
</svg>
