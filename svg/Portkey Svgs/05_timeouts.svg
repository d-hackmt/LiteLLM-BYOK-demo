<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="#0f1117"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">TIMEOUTS — HARD LIMIT PER REQUEST</text>

  <!-- Participant boxes: App=140, Portkey=400, LLM=660 -->
  <rect x="75" y="48" width="130" height="40" rx="6" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="140" y="73" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">App</text>

  <rect x="335" y="48" width="130" height="40" rx="6" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="67" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="400" y="81" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">Gateway</text>

  <rect x="595" y="48" width="130" height="40" rx="6" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="660" y="73" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">LLM</text>

  <!-- Lifelines -->
  <line x1="140" y1="90" x2="140" y2="390" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="90" x2="400" y2="390" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="660" y1="90" x2="660" y2="390" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- MSG 1: App → Portkey: Request with timeout (y=125) -->
  <line x1="142" y1="125" x2="398" y2="125" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="270" y="117" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Request (10s timeout)</text>

  <!-- MSG 2: Portkey → LLM: Forward (y=175) -->
  <line x1="402" y1="175" x2="658" y2="175" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="530" y="167" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Forward Request</text>

  <!-- Note on LLM: Processing slowly (y=190 to 218) -->
  <rect x="595" y="190" width="130" height="28" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="660" y="209" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Processing slowly...</text>

  <!-- Timeout bar on Portkey lifeline -->
  <rect x="392" y="190" width="16" height="65" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="430" y="198" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">⏱ Timer</text>
  <text x="430" y="211" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">running</text>
  <text x="430" y="224" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">10s limit</text>

  <!-- Timeout fires indicator -->
  <line x1="380" y1="258" x2="408" y2="258" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="254" fill="#ef4444" font-size="18" text-anchor="middle" font-family="system-ui,sans-serif">✕</text>
  <text x="460" y="262" fill="#ef4444" font-size="11" font-family="system-ui,sans-serif">Timeout fires</text>

  <!-- MSG 3: Portkey → App: 408 Timeout (y=300) -->
  <line x1="398" y1="300" x2="142" y2="300" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="270" y="293" text-anchor="middle" fill="#ef4444" font-size="11" font-family="system-ui,sans-serif">408 Request Timeout</text>

  <!-- Note on App: Retry or show error (y=315 to 343) -->
  <rect x="75" y="315" width="130" height="28" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="140" y="334" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Retry or show error</text>

  <!-- Caption -->
  <text x="400" y="408" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Set timeout once in config · Prevents hanging requests · Combine with retry for best results</text>
</svg>
