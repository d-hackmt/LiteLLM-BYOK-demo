<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 340">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22c55e"/>
    </marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#818cf8"/>
    </marker>
  </defs>

  <rect width="940" height="340" fill="#0f1117"/>

  <!-- Title -->
  <text x="470" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">METADATA — TAG EVERY REQUEST</text>

  <!-- Your App (center x=110) -->
  <rect x="35" y="72" width="150" height="52" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="110" y="104" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Your App</text>

  <!-- Portkey Gateway (center x=450) -->
  <rect x="375" y="72" width="150" height="52" rx="8" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="94" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="450" y="112" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="system-ui,sans-serif">Gateway</text>

  <!-- Groq LLM (center x=800) -->
  <rect x="725" y="72" width="180" height="52" rx="8" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="815" y="104" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Groq LLM</text>

  <!-- Dashboard (center x=370, y=210) -->
  <rect x="290" y="210" width="160" height="54" rx="8" fill="#1a1040" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="370" y="232" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="370" y="250" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui,sans-serif">Dashboard</text>

  <!-- Usage Analytics (center x=590, y=210) -->
  <rect x="510" y="210" width="160" height="54" rx="8" fill="#0a2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="590" y="232" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Usage</text>
  <text x="590" y="250" text-anchor="middle" fill="#4ade80" font-size="11" font-family="system-ui,sans-serif">Analytics</text>

  <!-- App → Portkey (with metadata label) -->
  <line x1="187" y1="87" x2="373" y2="87" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="280" y="76" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Request + Metadata Tags</text>

  <!-- Portkey → Groq -->
  <line x1="527" y1="87" x2="723" y2="87" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="625" y="79" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Forward</text>

  <!-- Groq → Portkey (return) -->
  <line x1="723" y1="109" x2="527" y2="109" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="625" y="132" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Response</text>

  <!-- Portkey → App (return) -->
  <line x1="373" y1="109" x2="187" y2="109" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Portkey → Dashboard (dashed vertical) -->
  <line x1="420" y1="126" x2="390" y2="208" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <text x="360" y="170" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">user · session</text>
  <text x="360" y="183" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">feature · env tags</text>

  <!-- Dashboard → Analytics -->
  <line x1="452" y1="237" x2="508" y2="237" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ap)"/>
  <text x="480" y="228" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">Filter &amp; Analyze</text>

  <!-- Metadata tag chips -->
  <rect x="38" y="148" width="78" height="22" rx="4" fill="#1e1040" stroke="#7c3aed" stroke-width="1"/>
  <text x="77" y="163" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="system-ui,sans-serif">_user: alice</text>
  <rect x="122" y="148" width="80" height="22" rx="4" fill="#1e1040" stroke="#7c3aed" stroke-width="1"/>
  <text x="162" y="163" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="system-ui,sans-serif">feature: search</text>
  <rect x="38" y="175" width="80" height="22" rx="4" fill="#1e1040" stroke="#7c3aed" stroke-width="1"/>
  <text x="78" y="190" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="system-ui,sans-serif">env: production</text>

  <!-- Caption -->
  <text x="470" y="322" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Tag any dimension you care about · Filter logs and costs by user, feature, or environment</text>
</svg>
