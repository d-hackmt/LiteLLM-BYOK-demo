<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7b9fd4"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22c55e"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#0f1117"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5" font-family="system-ui,sans-serif">RESILIENCE — RETRY + TIMEOUT + FALLBACK COMBINED</text>

  <!-- Participant boxes: App=110, Portkey=330, Primary=600, Fallback=850 -->
  <rect x="45" y="48" width="130" height="40" rx="6" fill="#1e2235" stroke="#3d5a8a" stroke-width="1.5"/>
  <text x="110" y="73" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500" font-family="system-ui,sans-serif">App</text>

  <rect x="265" y="48" width="130" height="40" rx="6" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
  <text x="330" y="67" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Portkey</text>
  <text x="330" y="81" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">Gateway</text>

  <rect x="535" y="48" width="130" height="40" rx="6" fill="#2d0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="67" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500" font-family="system-ui,sans-serif">Primary</text>
  <text x="600" y="81" text-anchor="middle" fill="#ef4444" font-size="10" font-family="system-ui,sans-serif">70B Model</text>

  <rect x="785" y="48" width="130" height="40" rx="6" fill="#0a2518" stroke="#22c55e" stroke-width="1.5"/>
  <text x="850" y="67" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500" font-family="system-ui,sans-serif">Fallback</text>
  <text x="850" y="81" text-anchor="middle" fill="#22c55e" font-size="10" font-family="system-ui,sans-serif">8B Model</text>

  <!-- Lifelines -->
  <line x1="110" y1="90" x2="110" y2="590" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="330" y1="90" x2="330" y2="590" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="90" x2="600" y2="590" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="850" y1="90" x2="850" y2="590" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- MSG 1: App → Portkey (y=125) -->
  <line x1="112" y1="125" x2="328" y2="125" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="220" y="115" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Request · timeout=5s · retry=2</text>

  <!-- MSG 2: Portkey → Primary: Attempt 1 (y=170) -->
  <line x1="332" y1="170" x2="598" y2="170" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="465" y="162" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Attempt 1 of 2</text>

  <!-- Note on Primary: error (y=185 to 213) -->
  <rect x="535" y="185" width="130" height="28" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="204" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Too slow or error...</text>

  <!-- MSG 3: Primary → Portkey: fail (y=240) -->
  <line x1="598" y1="240" x2="332" y2="240" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="465" y="233" text-anchor="middle" fill="#ef4444" font-size="11" font-family="system-ui,sans-serif">Timeout / 429 / 500</text>

  <!-- Note on Portkey: retry (y=255 to 283) -->
  <rect x="265" y="255" width="130" height="28" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="274" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="system-ui,sans-serif">⏳ Retry with backoff</text>

  <!-- MSG 4: Portkey → Primary: Attempt 2 (y=330) -->
  <line x1="332" y1="330" x2="598" y2="330" stroke="#7b9fd4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="465" y="322" text-anchor="middle" fill="#7b9fd4" font-size="11" font-family="system-ui,sans-serif">Attempt 2 of 2</text>

  <!-- MSG 5: Primary → Portkey: still failing (y=372) -->
  <line x1="598" y1="372" x2="332" y2="372" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="465" y="365" text-anchor="middle" fill="#ef4444" font-size="11" font-family="system-ui,sans-serif">Still failing</text>

  <!-- Note on Portkey: activating fallback (y=387 to 420) -->
  <rect x="250" y="387" width="160" height="33" rx="4" fill="#111827" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="402" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="system-ui,sans-serif">All retries exhausted</text>
  <text x="330" y="416" text-anchor="middle" fill="#818cf8" font-size="11" font-family="system-ui,sans-serif">Activating fallback →</text>

  <!-- MSG 6: Portkey → Fallback (y=470) -->
  <line x1="332" y1="470" x2="848" y2="470" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="590" y="462" text-anchor="middle" fill="#818cf8" font-size="11" font-family="system-ui,sans-serif">Route to fallback model</text>

  <!-- MSG 7: Fallback → Portkey: 200 (y=512) -->
  <line x1="848" y1="512" x2="332" y2="512" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="590" y="505" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">200 Success ✓</text>

  <!-- MSG 8: Portkey → App: response delivered (y=554) -->
  <line x1="328" y1="554" x2="112" y2="554" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="220" y="547" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif">Response delivered</text>

  <!-- Caption -->
  <text x="480" y="606" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Timeout cuts slow requests · Retry absorbs blips · Fallback handles outages · App stays up</text>
</svg>
